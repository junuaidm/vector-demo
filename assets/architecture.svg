<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity=".1"/></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f5f7fa" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1b1b1b">Docker Compose Architecture</text>

  <!-- Config (SSL Certs) -->
  <rect x="30" y="60" width="120" height="60" rx="8" fill="#fff3cd" stroke="#fd7e14" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#fd7e14">config</text>
  <text x="90" y="102" text-anchor="middle" font-size="10" fill="#555">SSL Cert Gen</text>

  <!-- Ollama -->
  <rect x="200" y="60" width="140" height="60" rx="8" fill="#e3fafc" stroke="#0078d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="270" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#0078d4">ollama</text>
  <text x="270" y="102" text-anchor="middle" font-size="10" fill="#555">Embedding Models</text>

  <!-- Model Puller -->
  <rect x="200" y="160" width="140" height="50" rx="8" fill="#e3fafc" stroke="#0078d4" stroke-width="1" stroke-dasharray="4" filter="url(#shadow)"/>
  <text x="270" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#0078d4">model-puller</text>
  <text x="270" y="197" text-anchor="middle" font-size="9" fill="#555">nomic + qwen3</text>

  <!-- NGINX -->
  <rect x="420" y="60" width="140" height="60" rx="8" fill="#d3f9d8" stroke="#40c057" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="490" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#40c057">model-web</text>
  <text x="490" y="102" text-anchor="middle" font-size="10" fill="#555">NGINX TLS :443</text>

  <!-- SQL Server -->
  <rect x="620" y="60" width="150" height="60" rx="8" fill="#deecf9" stroke="#005a9e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="695" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#005a9e">sql1</text>
  <text x="695" y="102" text-anchor="middle" font-size="10" fill="#555">SQL Server 2025 :1433</text>

  <!-- sql-tools -->
  <rect x="620" y="160" width="150" height="50" rx="8" fill="#deecf9" stroke="#005a9e" stroke-width="1" stroke-dasharray="4" filter="url(#shadow)"/>
  <text x="695" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#005a9e">sql-tools</text>
  <text x="695" y="197" text-anchor="middle" font-size="9" fill="#555">configure_model.sql</text>

  <!-- Arrows -->
  <!-- config → nginx (certs) -->
  <line x1="150" y1="90" x2="418" y2="90" stroke="#fd7e14" stroke-width="1.5" marker-end="url(#ah)" stroke-dasharray="5"/>
  <text x="280" y="78" text-anchor="middle" font-size="9" fill="#fd7e14">certs</text>

  <!-- ollama → nginx -->
  <line x1="340" y1="90" x2="418" y2="90" stroke="#0078d4" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="379" y="83" text-anchor="middle" font-size="9" fill="#0078d4">:11434</text>

  <!-- nginx → sql -->
  <line x1="560" y1="90" x2="618" y2="90" stroke="#40c057" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="589" y="83" text-anchor="middle" font-size="9" fill="#40c057">HTTPS</text>

  <!-- puller → ollama -->
  <line x1="270" y1="158" x2="270" y2="122" stroke="#0078d4" stroke-width="1.2" marker-end="url(#ah)"/>
  <text x="284" y="143" font-size="9" fill="#555">pull</text>

  <!-- sql-tools → sql -->
  <line x1="695" y1="158" x2="695" y2="122" stroke="#005a9e" stroke-width="1.2" marker-end="url(#ah)"/>
  <text x="709" y="143" font-size="9" fill="#555">setup</text>

  <!-- Volumes -->
  <rect x="30" y="250" width="740" height="120" rx="8" fill="#fff" stroke="#ddd" filter="url(#shadow)"/>
  <text x="50" y="275" font-size="12" font-weight="700" fill="#555">Volumes &amp; Persistence</text>

  <rect x="50" y="290" width="130" height="36" rx="6" fill="#eef1f6"/>
  <text x="115" y="312" text-anchor="middle" font-size="10" fill="#555">ollama-models</text>

  <rect x="200" y="290" width="130" height="36" rx="6" fill="#eef1f6"/>
  <text x="265" y="312" text-anchor="middle" font-size="10" fill="#555">sql-data</text>

  <rect x="350" y="290" width="130" height="36" rx="6" fill="#eef1f6"/>
  <text x="415" y="312" text-anchor="middle" font-size="10" fill="#555">./certs/</text>

  <rect x="500" y="290" width="130" height="36" rx="6" fill="#eef1f6"/>
  <text x="565" y="312" text-anchor="middle" font-size="10" fill="#555">./backups/</text>

  <text x="50" y="355" font-size="10" fill="#999">Model cache</text>
  <text x="200" y="355" font-size="10" fill="#999">MDF/LDF files</text>
  <text x="350" y="355" font-size="10" fill="#999">TLS certificates</text>
  <text x="500" y="355" font-size="10" fill="#999">DB backup files</text>
</svg>
